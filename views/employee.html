<!DOCTYPE html>
<html>
<head>
    <title>Employee Management</title>
    <link rel="stylesheet" href="/employee.css">
</head>
<body>

<h2>👨‍💼 Quản lý nhân viên</h2>

<div class="top-bar">
    <input type="text" id="search" placeholder="🔍 Tìm nhân viên..." onkeyup="searchEmployee()">
    <button onclick="openAdd()">➕ Thêm</button>
</div>

<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Username</th> <!-- ✅ thêm -->
            <th>Tên</th>
            <th>Chức vụ</th>
            <th>Lương</th>
            <th>Hành động</th>
        </tr>
    </thead>
    <tbody id="employeeTable"></tbody>
</table>

<!-- MODAL -->
<div id="modal" style="display:none;">
    <h3 id="modalTitle"></h3>

    <input type="hidden" id="empId">

    <label>User:</label>
    <select id="user_id"></select><br><br> <!-- ✅ thêm -->

    <input type="text" id="name" placeholder="Tên"><br><br>

    <select id="position">
        <option value="nv">Nhân viên</option>
        <option value="hr">HR</option>
        <option value="ql">Quản lý</option>
    </select><br><br>

    <input type="number" id="salary" placeholder="Lương"><br><br>

    <button onclick="save()">💾 Lưu</button>
    <button onclick="closeModal()">❌ Hủy</button>
</div>

<script>

// ================= LOAD EMPLOYEE =================
function loadEmployees() {
    fetch('/employee')
    .then(res => res.json())
    .then(data => {
        const table = document.getElementById('employeeTable');
        table.innerHTML = '';

        data.forEach(emp => {
            table.innerHTML += `
                <tr>
                    <td>${emp.id}</td>
                    <td>${emp.username || ''}</td> <!-- join -->
                    <td>${emp.name}</td>
                    <td>${emp.position}</td>
                    <td>${emp.salary}</td>
                    <td>
                        <button onclick="edit(${emp.id}, \`${emp.name}\`, \`${emp.position}\`, ${emp.salary}, ${emp.user_id || 'null'})">✏️</button>
                        <button onclick="remove(${emp.id})">🗑️</button>
                    </td>
                </tr>
            `;
        });
    });
}

// ================= LOAD USERS =================
function loadUsers(selectedId = null) {
    fetch('/admin/users')
    .then(res => res.json())
    .then(data => {
        const select = document.getElementById('user_id');
        select.innerHTML = '';

        data.forEach(user => {
            select.innerHTML += `
                <option value="${user.id}" ${user.id === selectedId ? 'selected' : ''}>
                    ${user.username}
                </option>
            `;
        });
    });
}

// ================= ADD =================
function openAdd() {
    document.getElementById('modalTitle').innerText = 'Thêm';
    document.getElementById('empId').value = '';
    document.getElementById('name').value = '';
    document.getElementById('position').value = 'nv';
    document.getElementById('salary').value = '';

    loadUsers();

    document.getElementById('modal').style.display = 'block';
}

// ================= EDIT =================
function edit(id, name, position, salary, user_id) {
    document.getElementById('modalTitle').innerText = 'Sửa';
    document.getElementById('empId').value = id;
    document.getElementById('name').value = name;
    document.getElementById('position').value = position;
    document.getElementById('salary').value = salary;

    loadUsers(user_id);

    document.getElementById('modal').style.display = 'block';
}

// ================= SAVE =================
function save() {
    const id = document.getElementById('empId').value;
    const name = document.getElementById('name').value;
    const position = document.getElementById('position').value;
    const salary = document.getElementById('salary').value;
    const user_id = document.getElementById('user_id').value;

    const url = id ? '/employee/update' : '/employee/add';

    fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            id: Number(id),
            name,
            position,
            salary: Number(salary),
            user_id: Number(user_id)
        })
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);
        closeModal();
        loadEmployees();
    });
}

// ================= DELETE =================
function remove(id) {
    fetch('/employee/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: Number(id) })
    })
    .then(res => res.text())
    .then(msg => {
        alert(msg);
        loadEmployees();
    });
}

// ================= SEARCH =================
function searchEmployee() {
    const keyword = document.getElementById('search').value.toLowerCase();
    const rows = document.querySelectorAll('#employeeTable tr');

    rows.forEach(row => {
        const name = row.children[2].innerText.toLowerCase();
        row.style.display = name.includes(keyword) ? '' : 'none';
    });
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
}

window.onload = loadEmployees;

</script>

</body>
</html>
